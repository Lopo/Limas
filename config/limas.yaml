parameters:
    limas.filesystem.data_directory: '%kernel.project_dir%/data/'
    limas:
        maintenance: false
#            title: ''
#            message: ''
        authentication_provider: 'HTTPBasic'
#        authentication_provider: 'JWT'
        auth:
            allow_password_change: true
            max_users: 'unlimited'
        frontend:
            auto_login:
                enabled: true
                username: admin
                password: admin
            base_url: false
            motd: ''
        tip_of_the_day_list: 'https://partkeepr.org/tips.json'
        tip_of_the_day_uri: 'https://partkeepr.org/tips/%s'
        image_cache_directory: '%kernel.cache_dir%/imagecache/'
        directories:
            mimetype_icons: '%kernel.project_dir%/public/images/mimes/'
        upload:
            limit: false
        octopart:
            nexarId: '%env(NEXAR_ID)%'
            nexarSecret: '%env(NEXAR_SECRET)%'
            limit: 5
        filesystem:
            data_directory: '%limas.filesystem.data_directory%'
            quota: false
        category:
            path_separator: ' ➤ '
        # Cron expressions for the scheduler-driven recurring jobs.
        # Picked up by Limas\Scheduler\LimasSchedule. Standard 5-field
        # cron format ("m h dom month dow"). Edit per-deployment to
        # match your maintenance window — defaults run early morning
        # local time when most installs are idle.
        scheduler:
            version_check_cron: '30 3 * * *'           # daily 03:30
            statistic_snapshot_cron: '35 3 * * *'      # daily 03:35
            sync_tips_cron: '0 4 * * 1'                # weekly Mon 04:00
            backup_cron: '0 2 * * *'                   # daily 02:00
            retry_attachment_downloads_cron: '40 3 * * *'  # daily 03:40
        # Bundled backup task — packs DB dump + attachments + secrets
        # into a single tarball. Local-only by design; operator can
        # mount an SMB/NFS share at `directory` for off-host storage.
        backup:
            enabled: true
            directory: '%kernel.project_dir%/var/backups'
            retention_count: 7                         # keep N newest archives
            mysqldump_path: 'mysqldump'                # override if not on PATH
        parts:
#            internalpartnumberunique: false
            internalpartnumberunique: '%env(bool:APP_DEBUG)%'
            limit: false
        users:
            limit: false

when@test:
    parameters:
        limas.filesystem.data_directory: '%kernel.project_dir%/data_test/'
        limas.username: admin
        limas.password: admin
