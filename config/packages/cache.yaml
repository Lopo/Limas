framework:
    cache:
        # Unique name of your app: used to compute stable namespaces for cache keys.
        #prefix_seed: your_vendor_name/app_name

        # The "app" cache stores to the filesystem by default.
        # The data in this cache should persist between deploys.
        # Other options include:

        # Redis
        app: cache.adapter.redis
        default_redis_provider: '%env(REDIS_DSN)%'

        # APCu (not recommended with heavy random-write workloads as memory fragmentation can cause perf issues)
        #app: cache.adapter.apcu

        # Namespaced pools use the above "app" backend by default
        pools:
            octopart.cache:
                adapter: app.cache.adapter.redis
            mouser.cache:
                adapter: app.cache.adapter.redis
            digikey.cache:
                adapter: app.cache.adapter.redis
            tme.cache:
                adapter: app.cache.adapter.redis
            farnell.cache:
                adapter: app.cache.adapter.redis
            newark.cache:
                adapter: app.cache.adapter.redis
            element14apac.cache:
                adapter: app.cache.adapter.redis
            oemsecrets.cache:
                adapter: app.cache.adapter.redis
            lcsc.cache:
                adapter: app.cache.adapter.redis
            # InfoProvider aggregator merged search + detail results. 5 min
            # TTL — vendor stock/prices barely move in that window, parameters
            # are effectively immutable. Saves repeating identical fan-outs
            # while the user clicks around the Apply Data dialog.
            aggregator.cache:
                adapter: app.cache.adapter.redis
                default_lifetime: 300
            #my.dedicated.cache: null
