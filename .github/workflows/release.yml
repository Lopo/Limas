name: Release

on:
    push:
        tags: [ 'v*' ]

permissions:
    contents: write

jobs:
    release:
        runs-on: ubuntu-latest
        steps:
            -   uses: actions/checkout@v4

            -   name: Bake version into LimasVersion.php
                run: |
                    VERSION="${GITHUB_REF_NAME#v}"
                    # Target only the constant declaration — don't touch the
                    # `{V_GIT}` mentions in the docblock above it
                    sed -i "s/LIMAS_VERSION = '{V_GIT}'/LIMAS_VERSION = '${VERSION}'/" src/LimasVersion.php

            -   name: Pack source tarball
                run: |
                    VERSION="${GITHUB_REF_NAME#v}"
                    # Exclude SCM + CI metadata + local-only test artifacts. Everything
                    # else from the working tree (already version-controlled) is shipped.
                    tar czf "limas-${VERSION}.tar.gz" \
                      --exclude=.git \
                      --exclude=.github \
                      --exclude=.idea \
                      --exclude=tests/e2e/test-results \
                      --exclude=tests/e2e/playwright-report \
                      --transform "s,^,limas-${VERSION}/," \
                      *

            -   uses: softprops/action-gh-release@v2
                with:
                    files: limas-*.tar.gz
                    generate_release_notes: true
